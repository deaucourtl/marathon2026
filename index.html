<title>Marathon 2026</title>
<style>
  :root {
    --green-deep: #1B4332;
    --green-mid: #2D6A4F;
    --green-light: #40916C;
    --green-pale: #95D5B2;
    --bg: #F5F7F2;
    --white: #FFFFFF;
    --text: #1C2B1A;
    --text-muted: #6B7280;
    --text-faint: #9CA3AF;
    --border: #E5E7EB;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); font-family: Georgia, 'Times New Roman', serif; color: var(--text); }
  body { max-width: 480px; margin: 0 auto; }

  #header {
    background: linear-gradient(155deg, #1B4332 0%, #2D6A4F 55%, #40916C 100%);
    padding: calc(var(--safe-top) + 18px) 18px 14px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(27,67,50,0.25);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .header-label { font-size: 10px; letter-spacing: 3px; color: var(--green-pale); text-transform: uppercase; margin-bottom: 3px; }
  .header-title { font-size: 21px; font-weight: bold; color: #fff; }
  .header-sub { font-size: 12px; color: #B7E4C7; margin-top: 2px; }
  .header-counter { text-align: right; background: rgba(255,255,255,0.13); border-radius: 12px; padding: 8px 14px; }
  .counter-num { font-size: 22px; font-weight: bold; color: #fff; }
  .counter-den { font-size: 13px; color: var(--green-pale); }
  .counter-label { font-size: 9px; color: var(--green-pale); letter-spacing: 1px; text-transform: uppercase; }
  .progress-bar-bg { height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #95D5B2, #D8F3DC); border-radius: 3px; transition: width 0.4s; }
  .progress-row { display: flex; justify-content: space-between; align-items: center; }
  .progress-pct { font-size: 10px; color: var(--green-pale); }
  .save-status { font-size: 9px; letter-spacing: 0.5px; }
  .save-ok { color: #6EE7B7; }
  .save-err { color: #FCA5A5; }

  .tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-top: 12px; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 6px 12px; border-radius: 20px; font-size: 10px; font-family: inherit; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; white-space: nowrap; transition: all 0.2s; border: 1.5px solid rgba(255,255,255,0.25); background: transparent; color: #D8F3DC; font-weight: normal; }
  .tab.active { border: none; background: #fff; font-weight: bold; }

  #content { padding: 14px 16px calc(var(--safe-bottom) + 80px); }

  .week { margin-bottom: 22px; }
  .week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .week-left { display: flex; align-items: center; gap: 10px; }
  .week-num { width: 30px; height: 30px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 2px solid; flex-shrink: 0; }
  .week-num.done { background: #D1FAE5; border-color: #16A34A !important; color: #16A34A !important; }
  .week-info-name { font-size: 13px; color: var(--text); font-weight: bold; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .week-info-dates { font-size: 10px; color: var(--text-muted); }
  .badge { font-size: 9px; padding: 2px 7px; border-radius: 10px; border: 1px solid; font-weight: normal; }
  .badge-recup { background: #F0FDF4; color: #166534; border-color: #86EFAC; }
  .badge-key { background: #FEF9C3; color: #713F12; border-color: #FDE047; }
  .badge-race { background: #FEF3C7; color: #92400E; border-color: #FCD34D; }
  .week-count { font-size: 11px; color: var(--text-faint); }
  .week-count.done { color: #16A34A; font-weight: bold; }

  .sessions { display: flex; flex-direction: column; gap: 7px; }
  .session-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 11px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .session-card.done { background: #F0FDF4; border-color: #86EFAC; box-shadow: none; }
  .check-btn { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; border: 2px solid #D1D5DB; background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; transition: all 0.2s; }
  .check-btn.done { border-color: #16A34A; background: #16A34A; box-shadow: 0 0 0 3px #DCFCE7; }
  .session-info { flex: 1; min-width: 0; }
  .session-tag-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .tag-badge { font-size: 9px; font-family: monospace; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 4px; border: 1px solid; font-weight: bold; }
  .session-day { font-size: 10px; color: var(--text-faint); }
  .session-name { font-size: 13px; font-weight: 600; letter-spacing: 0.2px; }
  .session-name.done { color: var(--text-faint); text-decoration: line-through; }
  .session-meta { text-align: right; flex-shrink: 0; }
  .session-dist { font-size: 11px; color: var(--green-mid); font-weight: bold; }
  .session-dur { font-size: 10px; color: var(--text-faint); }
  .session-arrow { color: #D1D5DB; font-size: 14px; }

  #modal-overlay {
    position: fixed; inset: 0; background: rgba(27,67,50,0.45);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 200; backdrop-filter: blur(2px);
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--white); border-radius: 22px 22px 0 0;
    border: 1.5px solid var(--border); border-bottom: none;
    width: 100%; max-width: 480px;
    max-height: 88vh; overflow-y: auto;
    padding: 20px 18px calc(var(--safe-bottom) + 30px);
    box-shadow: 0 -4px 30px rgba(27,67,50,0.15);
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  #modal-overlay.open #modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .modal-title-block { flex: 1; padding-right: 12px; }
  .modal-tag-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .modal-title { font-size: 17px; font-weight: bold; color: var(--text); line-height: 1.3; }
  .modal-stats { display: flex; gap: 14px; margin-top: 6px; }
  .modal-dist { font-size: 12px; color: var(--green-mid); font-weight: bold; }
  .modal-dur { font-size: 12px; color: var(--text-muted); }
  .close-btn { background: #F3F4F6; border: none; color: var(--text-muted); width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .divider { height: 1px; background: #F3F4F6; margin-bottom: 16px; }
  .section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; }
  .warmup-box { font-size: 13px; color: #374151; background: #FFFBEB; padding: 10px 13px; border-radius: 10px; border: 1px solid #FDE68A; line-height: 1.6; margin-bottom: 14px; }
  .blocks { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .block { background: #F9FDF9; border: 1px solid #D1FAE5; border-radius: 10px; padding: 10px 13px; }
  .block-label { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
  .block-desc { font-size: 13px; color: var(--text); line-height: 1.6; }
  .block-fc { font-size: 11px; color: #DC2626; font-weight: bold; margin-top: 5px; }
  .cooldown-box { font-size: 13px; color: #374151; background: #EFF6FF; padding: 10px 13px; border-radius: 10px; border: 1px solid #BAE6FD; line-height: 1.6; margin-bottom: 18px; }
  .validate-btn { width: 100%; padding: 15px; border-radius: 14px; border: none; background: linear-gradient(135deg, #1B4332, #2D6A4F); color: #fff; font-size: 15px; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 0 4px 14px rgba(27,67,50,0.25); }
  .validate-btn.done { background: linear-gradient(135deg, #16A34A, #15803D); }

  .no-save-notice { font-size: 10px; color: #FCD34D; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 3px 8px; }
</style>
</head>

const TAG_STYLES = {
  EF:{bg:"#D1FAE5",color:"#065F46",border:"#6EE7B7"},
  VMA:{bg:"#EDE9FE",color:"#4C1D95",border:"#C4B5FD"},
  TEMPO:{bg:"#FEF3C7",color:"#92400E",border:"#FCD34D"},
  AM:{bg:"#DCFCE7",color:"#14532D",border:"#86EFAC"},
  FARTLEK:{bg:"#DBEAFE",color:"#1E40AF",border:"#93C5FD"},
  "CÔTES":{bg:"#FFF7ED",color:"#9A3412",border:"#FDBA74"},
  MIXTE:{bg:"#F3E8FF",color:"#581C87",border:"#D8B4FE"},
  SL:{bg:"#E0F2FE",color:"#0C4A6E",border:"#7DD3FC"},
  "SL-CLEF":{bg:"#FEE2E2",color:"#7F1D1D",border:"#FCA5A5"},
  COURSE:{bg:"#FEF9C3",color:"#713F12",border:"#FDE047"}
};

let completed = {};
let activePhase = 0;
let currentSession = null;
const totalSessions = PHASES.reduce((a,p)=>a+p.weeks.reduce((b,w)=>b+w.sessions.length,0),0);

// Init storage
store.init();
completed = store.get(STORAGE_KEY);

function save() {
  store.set(STORAGE_KEY, completed);
  const el = document.getElementById('save-status');
  if (store.available) {
    el.textContent = '✓ sauvegardé'; el.className = 'save-status save-ok';
    setTimeout(()=>{ el.textContent=''; el.className='save-status'; }, 2000);
  } else {
    el.textContent = '⚠ sauvegarde indisponible (ouvre dans Safari)';
    el.className = 'save-status save-err';
  }
}

function tagBadge(tag, small) {
  const s = TAG_STYLES[tag]||TAG_STYLES.EF;
  return `<span class="tag-badge" style="background:${s.bg};color:${s.color};border-color:${s.border};font-size:${small?'9px':'10px'}">${tag}</span>`;
}

function updateHeader() {
  const done = Object.values(completed).filter(Boolean).length;
  const pct = Math.round(done/totalSessions*100);
  document.getElementById('done-count').textContent = done;
  document.getElementById('total-count').textContent = '/'+totalSessions;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-pct').textContent = pct+'% complété';
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = PHASES.map((p,i)=>
    `<button class="tab${i===activePhase?' active':''}" style="${i===activePhase?'color:'+p.color:''}" onclick="switchPhase(${i})">${p.name}</button>`
  ).join('');
}

function renderContent() {
  const phase = PHASES[activePhase];
  let html = '';
  for (const week of phase.weeks) {
    const wd = week.sessions.filter(s=>completed[s.id]).length;
    const allDone = wd===3;
    let badges = '';
    if(week.recovery) badges+=`<span class="badge badge-recup">RÉCUP</span>`;
    if(week.key) badges+=`<span class="badge badge-key">CLEF ⚡</span>`;
    if(week.race) badges+=`<span class="badge badge-race">${week.race}</span>`;
    html+=`<div class="week">
      <div class="week-header">
        <div class="week-left">
          <div class="week-num${allDone?' done':''}" style="border-color:${allDone?'#16A34A':phase.color};color:${allDone?'#16A34A':phase.color}">${allDone?'✓':week.num}</div>
          <div><div class="week-info-name">Semaine ${week.num} ${badges}</div><div class="week-info-dates">${week.dates}</div></div>
        </div>
        <div class="week-count${allDone?' done':''}">${wd}/3 ✓</div>
      </div><div class="sessions">`;
    for (const s of week.sessions) {
      const done = !!completed[s.id];
      html+=`<div class="session-card${done?' done':''}" onclick="openSession('${s.id}')">
        <button class="check-btn${done?' done':''}" onclick="event.stopPropagation();toggleCheck('${s.id}')">${done?'✓':''}</button>
        <div class="session-info">
          <div class="session-tag-row">${tagBadge(s.tag,true)}<span class="session-day">${s.day}</span></div>
          <div class="session-name${done?' done':''}">${s.type}</div>
        </div>
        <div class="session-meta"><div class="session-dist">${s.dist}</div><div class="session-dur">${s.dur}</div></div>
        <div class="session-arrow">›</div>
      </div>`;
    }
    html+=`</div></div>`;
  }
  document.getElementById('content').innerHTML = html;
}

function render() { updateHeader(); renderTabs(); renderContent(); }

function switchPhase(i) { activePhase=i; render(); }

function toggleCheck(id) { completed[id]=!completed[id]; save(); render(); }

function findSession(id) {
  for(const p of PHASES) for(const w of p.weeks) for(const s of w.sessions) if(s.id===id) return s;
  return null;
}

function openSession(id) {
  currentSession = findSession(id);
  if(!currentSession) return;
  const s = currentSession;
  const done = !!completed[s.id];
  let html = `<div class="modal-header">
    <div class="modal-title-block">
      <div class="modal-tag-row">${tagBadge(s.tag)}<span style="font-size:11px;color:var(--text-faint)">${s.day}</span></div>
      <div class="modal-title">${s.type}</div>
      <div class="modal-stats"><span class="modal-dist">📏 ${s.dist}</span><span class="modal-dur">⏱ ${s.dur}</span></div>
    </div>
    <button class="close-btn" onclick="closeModal()">×</button>
  </div><div class="divider"></div>`;
  if(s.wu) html+=`<div style="margin-bottom:14px"><div class="section-label" style="color:#D97706">🔥 Échauffement</div><div class="warmup-box">${s.wu}</div></div>`;
  html+=`<div style="margin-bottom:14px"><div class="section-label" style="color:#2D6A4F">🏃 Détail de la séance</div><div class="blocks">`;
  for(const b of s.blocks) html+=`<div class="block"><div class="block-label">${b.l}</div><div class="block-desc">${b.d}</div>${b.fc?`<div class="block-fc">❤️ ${b.fc}</div>`:''}</div>`;
  html+=`</div></div>`;
  if(s.cd) html+=`<div style="margin-bottom:18px"><div class="section-label" style="color:#0369A1">❄️ Note / Retour au calme</div><div class="cooldown-box">${s.cd}</div></div>`;
  html+=`<button class="validate-btn${done?' done':''}" onclick="validateFromModal()">${done?'✓ Séance validée — Annuler ?':'✓ Valider cette séance'}</button>`;
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentSession = null;
}

function validateFromModal() {
  if(!currentSession) return;
  toggleCheck(currentSession.id);
  closeModal();
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if(e.target===this) closeModal();
});

// Démarrage immédiat — pas d'écran de chargement
render();
if(!store.available) {
  document.getElementById('save-status').textContent = '⚠ Ouvre dans Safari pour sauvegarder';
  document.getElementById('save-status').className = 'save-status save-err';
}
</script>
